on:
  push:
    branches:
      - main
    paths:
      - 'bench/routers/**/*'
      - 'src/**/*'

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write

    defaults:
      run:
        working-directory: ./bench/routers

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # build
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: |
          cd ..
          bun i
          bun task build
          cd routers

          bun i

      # bun
      - name: bun
        continue-on-error: true
        run: bun start:bun md > results-bun.txt

      # deno
      - uses: denoland/setup-deno@v2.0.3
        with:
          deno-version: latest

      - name: deno
        continue-on-error: true
        run: bun start:deno md > results-deno.txt

      # node
      - uses: actions/setup-node@v4
        with:
          node-version: latest

      - name: node
        continue-on-error: true
        run: bun start:node md > results-node.txt

      # Push results
      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add .
          git commit -m "update micro-benchmark results"

      - name: Push with retry
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for i in {1..10}; do
            git pull --rebase origin ${{ github.ref_name }}

            if git push origin HEAD:${{ github.ref_name }}; then
              echo "Push succeeded"
              exit 0
            fi

            echo "Push failed, retry $i..."
            sleep 3
          done

          echo "Push failed after retries"
          exit 1
